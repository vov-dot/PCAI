<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Assistant</title>
    <style>
        :root {
            --bg: #0f1115;
            --surface: #1a1d24;
            --border: #2a2d36;
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --text: #e2e8f0;
            --text-muted: #94a3b8;
            --user-bubble: #2563eb;
            --ai-bubble: #1e232e;
            --font: system-ui, -apple-system, sans-serif;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--surface);
        }
        h1 { font-size: 1.25rem; font-weight: 600; }
        #clear-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
        }
        #clear-btn:hover { background: var(--border); color: var(--text); }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .message {
            max-width: 85%;
            padding: 1rem 1.25rem;
            border-radius: 16px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .message.user {
            align-self: flex-end;
            background: var(--user-bubble);
            color: white;
            border-bottom-right-radius: 4px;
        }
        .message.ai {
            align-self: flex-start;
            background: var(--ai-bubble);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }
        .message a { color: #60a5fa; text-decoration: none; border-bottom: 1px dashed #60a5fa; }
        .message a:hover { color: #93c5fd; }

        .input-area {
            padding: 1rem 1.5rem;
            background: var(--surface);
            border-top: 1px solid var(--border);
            display: flex;
            gap: 0.75rem;
            align-items: flex-end;
        }
        #user-input {
            flex: 1;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.9rem;
            border-radius: 12px;
            font-family: var(--font);
            font-size: 1rem;
            resize: none;
            max-height: 150px;
            outline: none;
            transition: 0.2s;
        }
        #user-input:focus { border-color: var(--primary); }
        #send-btn {
            background: var(--primary);
            color: white;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1.2rem;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #send-btn:hover { background: var(--primary-hover); }
        #send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        #status {
            text-align: center;
            padding: 0.5rem;
            color: var(--text-muted);
            font-size: 0.85rem;
            min-height: 1.5rem;
        }
        .typing { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        @media (max-width: 600px) {
            .message { max-width: 95%; }
            header { padding: 0.75rem 1rem; }
            #chat-container { padding: 1rem; }
        }
    </style>
</head>
<body>
    <header>
        <h1>🤖 AI Assistant</h1>
        <button id="clear-btn" title="Очистить историю">🗑️ Новый чат</button>
    </header>

    <main id="chat-container">
        <div class="message ai">Привет! Я готов помочь. Просто напишите запрос, а я сам решу, нужно ли искать информацию, создавать документы, таблицы или работать с почтой. Например:<br><br>• «Создай таблицу с ценами на RTX 4090»<br>• «Кратко опиши последние письма»<br>• «Отправь отчет на test@mail.ru»</div>
    </main>

    <div id="status"></div>
    <div class="input-area">
        <textarea id="user-input" placeholder="Напишите запрос..." rows="1"></textarea>
        <button id="send-btn">➤</button>
    </div>

    <script>
        const chatBox = document.getElementById('chat-container');
        const input = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const clearBtn = document.getElementById('clear-btn');
        const status = document.getElementById('status');

        let history = [];

        function appendMessage(role, text) {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            
            // Безопасный рендеринг с поддержкой переносов и ссылок
            let html = text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/\n/g, '<br>')
                .replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank">$1</a>');
                
            div.innerHTML = html;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function setStatus(msg) {
            status.textContent = msg;
            status.className = msg ? 'typing' : '';
        }

        async function sendMessage() {
            const text = input.value.trim();
            if (!text) return;

            appendMessage('user', text);
            input.value = '';
            input.style.height = 'auto';
            sendBtn.disabled = true;
            setStatus('⚙️ ИИ анализирует запрос и вызывает инструменты...');

            try {
                // Формируем историю для бэкенда
                const historyStr = history.map(m => `${m.role}: ${m.content}`).join('\n');

                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text, history: historyStr })
                });

                const data = await res.json();
                if (data.response) {
                    appendMessage('ai', data.response);
                    history.push({ role: 'user', content: text });
                    history.push({ role: 'ai', content: data.response });
                } else {
                    appendMessage('ai', '⚠️ Пустой ответ от сервера');
                }
            } catch (err) {
                appendMessage('ai', '❌ Ошибка соединения с сервером');
                console.error(err);
            } finally {
                sendBtn.disabled = false;
                setStatus('');
                input.focus();
            }
        }

        // Авто-высота textarea
        input.addEventListener('input', () => {
            input.style.height = 'auto';
            input.style.height = Math.min(input.scrollHeight, 150) + 'px';
        });

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        sendBtn.addEventListener('click', sendMessage);

        clearBtn.addEventListener('click', () => {
            history = [];
            chatBox.innerHTML = '<div class="message ai">История очищена. Чем могу помочь?</div>';
        });
    </script>
</body>
</html>
